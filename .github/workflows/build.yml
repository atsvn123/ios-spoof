name: Build iOSSpoof

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer 2>/dev/null || true
          xcode-select -p

      - name: Cache Theos
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: |
            ~/theos
          key: theos-${{ runner.os }}-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: |
            theos-${{ runner.os }}-

      - name: Install build tools
        run: brew install ldid make perl

      - name: Install Theos
        run: |
          if [ -d "$HOME/theos/.git" ]; then
            git -C "$HOME/theos" submodule update --init --recursive
          elif [ -d "$HOME/theos" ] && [ "$(ls -A "$HOME/theos")" ]; then
            rm -rf "$HOME/theos"
            git clone --recursive https://github.com/theos/theos.git "$HOME/theos"
          else
            mkdir -p "$HOME/theos"
            git clone --recursive https://github.com/theos/theos.git "$HOME/theos"
          fi
          # Install SDKs
          mkdir -p "$HOME/theos/sdks"
          curl -L -o "$HOME/theos/sdks.tar.xz" https://github.com/theos/sdks/releases/latest/download/sdks.tar.xz || true
          if [ -f "$HOME/theos/sdks.tar.xz" ]; then
            tar -xf "$HOME/theos/sdks.tar.xz" -C "$HOME/theos/sdks/" 2>/dev/null || true
          fi
          # Fallback: clone SDK repo
          if ! ls "$HOME/theos/sdks"/iPhoneOS*.sdk >/dev/null 2>&1; then
            rm -rf /tmp/sdks
            git clone https://github.com/theos/sdks.git /tmp/sdks
            cp -R /tmp/sdks/*.sdk "$HOME/theos/sdks/" 2>/dev/null || true
          fi

      - name: Verify Theos
        run: |
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          ls ~/theos/sdks/ || true
          ~/theos/bin/theos --version || echo "theos check done"

      - name: Build tweak
        run: |
          export THEOS=$HOME/theos
          export THEOS_PACKAGE_SCHEME=rootless
          chmod +x layout/DEBIAN/postinst layout/DEBIAN/postrm || true
          make clean
          make package FINALPACKAGE=1

      - name: Inspect package contents
        run: |
          for deb in packages/*.deb; do
            echo "Inspecting $deb"
            rm -rf /tmp/iosspoof-deb
            mkdir -p /tmp/iosspoof-deb
            cp "$deb" /tmp/iosspoof-deb/package.deb
            (cd /tmp/iosspoof-deb && ar -x package.deb)
            echo "Control archive:"
            (cd /tmp/iosspoof-deb && for f in control.tar.*; do [ -f "$f" ] && tar -tf "$f" | grep -E 'postinst|postrm|control' || true; done)
            echo "Data archive:"
            (cd /tmp/iosspoof-deb && for f in data.tar.*; do [ -f "$f" ] && tar -tf "$f" | grep -E 'iOSSpoof\.app|iOSSpoof\.app/iOSSpoof$|Info\.plist' || true; done)
            mkdir -p /tmp/iosspoof-deb/root
            (cd /tmp/iosspoof-deb/root && for f in ../data.tar.*; do [ -f "$f" ] && tar -xf "$f" || true; done)
            find /tmp/iosspoof-deb -path '*iOSSpoof.app*' -maxdepth 6 -print || true
            if [ -f /tmp/iosspoof-deb/root/var/jb/Applications/iOSSpoof.app/Info.plist ]; then
              plutil -p /tmp/iosspoof-deb/root/var/jb/Applications/iOSSpoof.app/Info.plist || true
            fi
            if [ -f /tmp/iosspoof-deb/root/Applications/iOSSpoof.app/Info.plist ]; then
              plutil -p /tmp/iosspoof-deb/root/Applications/iOSSpoof.app/Info.plist || true
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iOSSpoof-package
          path: |
            packages/*.deb
            *.deb

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/*.deb
            *.deb
          generate_release_notes: true
